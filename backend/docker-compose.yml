services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: fleetflow_api
    ports:
      - "${PORT:-4000}:${PORT:-4000}"
    env_file: .env
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - DATABASE_URL=postgresql://${DB_USER}:${DB_PASS}@postgres:5432/${DB_NAME}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - uploads_data:/app/uploads
    restart: unless-stopped
    networks:
      - fleetflow_network

  postgres:
    image: postgres:16-alpine
    container_name: fleetflow_postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-fleetflow_user} -d ${DB_NAME:-fleetflow_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - fleetflow_network

volumes:
  pgdata:
    driver: local
  uploads_data:
    driver: local

networks:
  fleetflow_network:
    driver: bridge
